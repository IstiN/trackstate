test_id: TS-868
type: web
framework: playwright
platform: chromium
dependencies:
  - Python 3 available on PATH
  - Playwright browsers installed
notes:
  - Runs against the deployed TrackState app via the shared live-web Playwright harness.
  - Uses a stored hosted token and three preloaded hosted workspaces from the setup repository runtime.
  - Establishes the second-row precondition with Arrow Down, then verifies Home and End move both selection and DOM focus to the list boundaries while the switcher remains open.
runtime_inputs:
  workspace_count: 3
  first_workspace_kind: hosted
  second_workspace_kind: hosted
  third_workspace_kind: hosted
  initial_active_workspace: first
  precondition_action: Arrow Down to second row
  keyboard_actions:
    - Home
    - End
  expected_result: Home moves selection and focus to the first row, End moves selection and focus to the last row, and the switcher remains open
  run_command: mkdir -p outputs && PYTHONPATH=. python3 testing/tests/TS-868/test_ts_868.py
