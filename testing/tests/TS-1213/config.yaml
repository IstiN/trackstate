test_id: TS-1213
type: cli
framework: unittest
platform: python
dependencies:
  - Dart SDK available on PATH or via TRACKSTATE_DART_BIN
  - git CLI available on PATH
notes:
  - Compiles a temporary `trackstate` executable from this checkout.
  - Seeds a disposable Local Git repository with one existing issue because local mutation commands reject completely empty repositories.
  - Creates one story issue, injects a legacy issue-local `links.json`, creates a second story issue, and links the two issues with `trackstate ticket link --type blocks`.
  - Verifies the repository-root `links.json` is updated with the live non-hierarchical link while the stale issue-local `links.json` file is purged automatically.
