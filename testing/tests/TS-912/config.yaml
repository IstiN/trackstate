test_id: TS-912
type: ui
framework: flutter_test
platform: linux
dependencies:
  - Flutter SDK available on PATH
notes:
  - Runs in the supported Flutter widget runtime at 1440x900.
  - Seeds one hosted active workspace plus one saved local workspace marked unavailable.
  - Verifies the visible Retry or Re-authenticate action completes one directory-access prompt and restores the saved workspace to active Local Git.
runtime_inputs:
  active_workspace_kind: hosted
  retry_workspace_kind: local unavailable
  viewport: 1440x900
  expected_retry_actions:
    - Retry
    - Re-authenticate
  expected_directory_picker_calls: 1
  expected_final_state: saved local workspace restored as active Local Git
  run_command: flutter test testing/tests/TS-912/test_ts_912.dart --reporter expanded
