test_id: TS-596
type: cli
framework: python
platform: standalone-dart-vm
dependencies:
  - Dart SDK available on PATH or via TRACKSTATE_DART_BIN
notes:
  - Executes the standalone Dart AOT compile flow for `bin/trackstate.dart`.
  - Redirects the output binary to a temporary directory so the repository checkout stays clean while the compile path remains identical.
  - Verifies exit code 0, no `dart:ui` platform-availability error is surfaced, and a standalone executable is produced.
runtime_inputs:
  ticket_command: dart compile exe bin/trackstate.dart -o bin/trackstate_cli
  requested_command:
    - dart
    - compile
    - exe
    - bin/trackstate.dart
    - -o
    - bin/trackstate_cli
  source_entrypoint: bin/trackstate.dart
  output_file_name: trackstate_cli
  forbidden_output_fragments:
    - "Dart library 'dart:ui' is not available on this platform"
    - "dart:ui"
