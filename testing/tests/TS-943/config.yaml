test_id: TS-943
type: ci
framework: gh-cli
platform: github-actions
dependencies:
  - gh CLI authenticated with push access to IstiN/trackstate and GitHub Actions
  - network access to GitHub REST APIs, pull requests, and workflow logs
runtime_inputs:
  repository: IstiN/trackstate
  base_branch: main
  target_workflow_name: Flutter Required Checks
  target_workflow_path: .github/workflows/unit-tests.yml
  probe_path: testing/accessibility/ts943_silent_engine_logger.js
  probe_render_host_path: testing/accessibility/accessibility_gate.spec.js
  branch_prefix: ts943-engine-log-validation
  commit_message: "TS-943 probe: verify missing engine-state tokens fail CI"
  pull_request_title: "TS-943 disposable probe: verify missing engine-state tokens fail CI"
  pull_request_body: "Disposable PR created by TS-943 automation to suppress the Flutter engine lifecycle logging wrapper during the live accessibility run and verify that CI fails with a log-validation error when mandatory engine-state tokens are missing."
  expected_accessibility_markers:
    - log-validation
    - engine state tokens
    - flutter engine
    - accessibility
  contrast_evidence_markers:
    - failed
    - error
    - process completed with exit code 1
  semantic_evidence_markers:
    - Flutter engine initialization
    - Semantics tree discovery
    - Accessibility runtime surface ready
  poll_interval_seconds: 5
  run_timeout_seconds: 900
  pull_request_timeout_seconds: 180
notes:
  - Creates a disposable pull request that changes only testing/accessibility files to suppress the runtime engine logging wrapper during the live accessibility workflow.
  - Expects the live CI surface to fail a dedicated log-validation path and report that mandatory engine-state tokens were not found.
