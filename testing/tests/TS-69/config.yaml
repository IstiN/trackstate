test_id: TS-69
type: web
framework: unittest
platform: python
dependencies:
  - gh CLI authenticated for a user that can create or access a fork of IstiN/trackstate-setup
  - network access to GitHub APIs and the deployed GitHub Pages site
runtime_inputs:
  upstream_repository: IstiN/trackstate-setup
  workflow_file: install-update-trackstate.yml
  workflow_ref: main
  trackstate_ref: main
  # The probe widens the fork's Actions permissions so the workflow can register.
  # Override to a more restrictive policy (e.g. "local_only") if the test account
  # is subject to enterprise/org-level Actions restrictions.
  allowed_actions: all
