test_id: TS-600
type: api
framework: flutter_test
platform: linux
dependencies:
  - AC - Typed mutation result contract for provider and filesystem failures
notes:
  - Exercises the concrete IssueMutationService.updateFields path against a temporary Local Git-backed repository.
  - Reproduces a real filesystem-backed provider failure by blocking the generated TRACK/.trackstate/index/issues.json write with a conflicting file-system artifact.
  - Verifies the returned typed mutation result stays machine-readable with category provider-failure and a user-safe message that does not leak raw filesystem exception details.
