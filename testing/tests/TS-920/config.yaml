test_id: TS-920
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app with a stored signed-in GitHub token.
  - Preloads one hosted workspace as active plus one saved local workspace that starts unavailable.
  - Recreates the saved local repository before clicking the manual restore action so successful recovery would be possible if the picker were accepted.
  - Simulates a user canceling the browser directory picker by forcing showDirectoryPicker() to reject with AbortError, then verifies the workspace remains unavailable.
