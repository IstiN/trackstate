test_id: TS-841
type: ui
framework: flutter_test
platform: linux
dependencies:
  - Flutter SDK available on PATH
notes:
  - Seeds two saved local workspaces with the second workspace selected before launch.
  - Covers the keyboard regression fixed by TS-836 by clicking the active second row before sending Arrow Up.
  - Verifies the previous workspace becomes active and the switcher panel stays open.
runtime_inputs:
  workspace_count: 2
  first_workspace_kind: local
  second_workspace_kind: local
  initial_active_workspace: second
  keyboard_action: Arrow Up
  expected_result: previous workspace becomes active and switcher remains open
  run_command: flutter test testing/tests/TS-841/test_ts_841.dart --reporter expanded
