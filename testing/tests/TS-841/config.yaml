test_id: TS-841
type: ui
framework: flutter_test
platform: linux
dependencies:
  - Flutter SDK available on PATH
notes:
  - Seeds two saved local workspaces with the second workspace selected before launch.
  - Uses the ticket preconditioned state directly and sends Arrow Up without an extra row click.
  - Verifies the previous workspace becomes active, receives keyboard focus, and the switcher panel stays open.
runtime_inputs:
  workspace_count: 2
  first_workspace_kind: local
  second_workspace_kind: local
  initial_active_workspace: second
  keyboard_action: Arrow Up
  expected_result: previous workspace becomes active, receives focus, and switcher remains open
  run_command: flutter test testing/tests/TS-841/test_ts_841.dart --reporter expanded
