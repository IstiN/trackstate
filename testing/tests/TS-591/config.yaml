test_id: TS-591
type: cli
framework: python
platform: local-git
dependencies:
  - Dart SDK available on PATH or via TRACKSTATE_DART_BIN
  - git CLI available on PATH
  - GH_TOKEN or GITHUB_TOKEN with release upload access to the hosted setup repository
notes:
  - Seeds a disposable local TrackState repository configured for github-releases attachment storage and pointed at the live setup repository as origin.
  - Pre-creates a GitHub Release containing data.csv and a matching local attachments.json entry for TS-123.
  - Forces only DELETE /repos/{owner}/{repo}/releases/assets/{asset_id} to return HTTP 403 via the test-only CLI harness override while the rest of the live GitHub flow remains real.
  - Executes the exact local CLI command `trackstate attachment upload --issue TS-123 --file data.csv --target local`.
  - Passes only when the CLI surfaces an explicit asset-replacement failure and attachments.json remains unchanged with the original asset id.
runtime_inputs:
  ticket_command: trackstate attachment upload --issue TS-123 --file data.csv --target local
  requested_command:
    - trackstate
    - attachment
    - upload
    - --issue
    - TS-123
    - --file
    - data.csv
    - --target
    - local
  project_key: TS
  project_name: TS-591 Project
  issue_key: TS-123
  issue_summary: TS-591 release replacement delete failure fixture
  source_file_name: data.csv
  source_file_text: |-
    id,value
    1,ts-591-replacement
    2,should-not-upload
  expected_attachment_name: data.csv
  release_tag_prefix_base: ts591-assets-
  seeded_attachment_text: |-
    id,value
    1,ts-591-seeded
  seeded_attachment_created_at: "2026-05-13T07:00:00Z"
  attachment_media_type: text/csv
  manifest_poll_timeout_seconds: 20
  manifest_poll_interval_seconds: 2
  release_poll_timeout_seconds: 20
  release_poll_interval_seconds: 2
  delete_release_asset_override_status_code: 403
  delete_release_asset_override_body: >-
    {"message":"Forbidden","documentation_url":"https://docs.github.com/rest/releases/assets#delete-a-release-asset","status":"403"}
