test_id: TS-840
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app with a stored hosted token and two preloaded saved hosted workspaces.
  - Opens the desktop workspace switcher from Dashboard.
  - Verifies that clicking the active saved-workspace row moves keyboard focus onto that row before Arrow Down is pressed.
  - Verifies that Arrow Down then advances the active selection to the next saved workspace while the panel remains open.
