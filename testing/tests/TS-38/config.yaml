test_id: TS-38
type: api
framework: unittest
platform: python
dependencies:
  - TS-38 auto-provisions a cached Dart SDK when dart is not already available on PATH or via TS38_DART_BIN
  - offline dart pub get in testing/tests/TS-38/dart_probe
runtime_bootstrap:
  - cached Dart SDK root defaults to ~/.cache/trackstate-test-tools and can be overridden with TS38_TOOL_CACHE
  - Dart SDK archive/checksum metadata lives in testing/tests/TS-38/dart_probe/runtime_manifest.json
