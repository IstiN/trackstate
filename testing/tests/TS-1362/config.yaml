test_id: TS-1362
type: cli
framework: python
platform: standalone-dart-vm
dependencies:
  - Dart SDK available on PATH or via TRACKSTATE_DART_BIN
  - Git available on PATH for seeding the disposable local repository
notes:
  - Compiles the CLI entrypoint to a temporary standalone executable.
  - Seeds a disposable local TrackState repository with TRACK-1.
  - Runs `trackstate read ticket --key TRACK-1` via the compiled binary and via `dart bin/trackstate.dart`.
  - Compares the JSON output shape to confirm compiled-binary parity.
  - Runs `trackstate session --target hosted --repository IstiN/trackstate` with TRACKSTATE_TOKEN set
    to exercise the environment-token auth path and confirms the error envelope shape matches
    between the compiled binary and the Dart VM entrypoint.
runtime_inputs:
  ticket_command: dart compile exe bin/trackstate.dart -o <temp_binary>
  requested_command:
    - dart
    - compile
    - exe
    - bin/trackstate.dart
    - -o
    - <temp_binary>
  source_entrypoint: bin/trackstate.dart
  output_file_name: trackstate
  forbidden_output_fragments:
    - "Dart library 'dart:ui' is not available on this platform"
    - "dart:ui"
  project_key: TRACK
  project_name: TS-1362 Compiled CLI Regression Project
  seed_issue_key: TRACK-1
  seed_issue_summary: TS-1362 Seed Issue
  seed_issue_description: Seed issue for compiled CLI regression parity.
  hosted_repository: IstiN/trackstate
