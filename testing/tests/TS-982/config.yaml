test_id: TS-982
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Seeds a hosted workspace into browser storage and injects a one-time HTTP 500 on the live startup branch-sync request so the workspace-sync bootstrap path fails without blocking initial shell data hydration.
  - Uses the ticket viewport of 1440x900 and waits for the async post-failure state to settle before asserting the desktop shell state.
  - Verifies the top bar, sidebar navigation, and workspace switcher remain usable while the hosted workspace shows the exact Sync issue recovery state instead of an auth/sign-in fallback or terminal blank surface.
