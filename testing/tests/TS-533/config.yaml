test_id: TS-533
type: cli
framework: python
platform: local
dependencies:
  - Dart SDK available on PATH or via TRACKSTATE_DART_BIN
  - git CLI available on PATH
  - GH_TOKEN available in the environment
notes:
  - Executes the exact TS-533 local attachment upload command from a disposable TrackState repository configured for github-releases attachment storage.
  - Mirrors GH_TOKEN into TRACKSTATE_TOKEN so the local runtime exercises an authenticated GitHub identity without inheriting extra ambient state.
  - Uses a public GitHub repository outside the current token's write scope so release creation or asset upload must fail with explicit permission guidance if the feature works.
runtime_inputs:
  ticket_command: trackstate attachment upload --issue TS-475 --file test.txt --target local
  requested_command:
    - trackstate
    - attachment
    - upload
    - --issue
    - TS-475
    - --file
    - test.txt
    - --target
    - local
  project_key: TS
  project_name: TS-533 Project
  issue_key: TS-475
  issue_summary: Release-backed local upload insufficient-permission fixture
  source_file_name: test.txt
  source_file_text: |
    TS-533 upload payload
    This file should never be written when release-backed upload permission is denied.
  attachment_tag_prefix: ts533-
  remote_origin_url: https://github.com/octocat/Hello-World.git
  token_source_environment_variable: GH_TOKEN
  expected_issue_key: TS-475
  expected_attachment_name: test.txt
  expected_attachment_relative_path: TS/TS-475/attachments/test.txt
  expected_release_fragments:
    - github releases
    - github-releases
    - release-backed
    - github release uploads
  expected_auth_fragments:
    - permission to manage releases
    - permission to upload assets
    - requires permission
    - does not permit
    - does not permit github release uploads
  provider_capability_fragments:
    - authentication/configuration
    - supports release uploads
    - cannot upload release-backed attachments
