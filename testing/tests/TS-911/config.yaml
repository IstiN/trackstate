test_id: TS-911
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app with a stored hosted token and three preloaded saved hosted workspaces.
  - Opens the desktop workspace switcher from Dashboard and confirms the selected first saved workspace row plus the visible Save and switch footer control are present.
  - Focuses the selected first workspace row, presses Tab through the visible in-panel sequence until Save and switch, then requires one more Tab press to wrap back to the first row.
  - Verifies reverse wrap returns to Save and switch instead of escaping to the app shell.
