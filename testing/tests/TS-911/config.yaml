test_id: TS-911
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app with a stored hosted token and three preloaded saved hosted workspaces.
  - Opens the desktop workspace switcher from Dashboard and confirms the live first and last keyboard-reachable internal targets are present.
  - Establishes the ticket precondition from the open panel's derived first internal target instead of assuming the selected saved-workspace row is focusable.
  - Verifies reverse wrap returns to the observed last internal control instead of escaping to the app shell.
