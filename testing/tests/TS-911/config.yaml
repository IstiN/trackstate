test_id: TS-911
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app with a stored hosted token and three preloaded saved hosted workspaces.
  - Opens the desktop workspace switcher from a focused trigger and confirms the live visible controls plus the last internal keyboard target are present.
  - Establishes the ticket precondition from the live initial focus state or a real Tab into the open panel instead of a helper-only direct-focus path.
  - Verifies reverse wrap returns to the observed last internal control instead of escaping to the app shell.
