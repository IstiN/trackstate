test_id: TS-911
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app with a stored hosted token and three preloaded saved hosted workspaces.
  - Opens the desktop workspace switcher from Dashboard and confirms the visible workspace-switcher panel is rendered for the hosted main workspace.
  - Focuses the open workspace-switcher trigger and uses a single Tab press to prove whether keyboard focus actually enters the first internal workspace row.
  - Verifies reverse wrap returns to Save and switch instead of escaping to the app shell.
