test_id: TS-911
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app with a stored hosted token and three preloaded saved hosted workspaces.
  - Opens the desktop workspace switcher from Dashboard and confirms the selected first saved workspace row plus a distinct last internal keyboard target are present.
  - Focuses the selected first saved workspace row and proves from the open panel's internal tab order that this row is the first keyboard target.
  - Verifies reverse wrap returns to the observed last internal control instead of escaping to the app shell.
