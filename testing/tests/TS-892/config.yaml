test_id: TS-892
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app with a stored signed-in GitHub token.
  - Preloads an active local workspace plus one hosted workspace in browser storage.
  - Reproduces a permanent local file-system failure by deleting the prepared local repository before startup.
  - Waits longer than the startup revalidation window before asserting that the local workspace stays unavailable without switching the active selection to hosted.
