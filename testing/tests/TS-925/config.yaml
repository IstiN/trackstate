test_id: TS-925
type: ci
framework: gh-cli
platform: github-actions
dependencies:
  - gh CLI authenticated with push access to IstiN/trackstate and GitHub Actions
  - Playwright for human-style GitHub Actions run-page verification
runtime_inputs:
  repository: IstiN/trackstate
  base_branch: main
  target_workflow_name: Flutter Required Checks
  target_workflow_path: .github/workflows/unit-tests.yml
  probe_path: lib/ts908_probe_surface.dart
  probe_render_host_path: lib/main.dart
  branch_prefix: ts925-accessibility-fail-fast
  commit_message: "TS-925 probe: verify accessibility failure blocks downstream deployment"
  pull_request_title: "TS-925 disposable probe: verify accessibility fail-fast deployment gate"
  pull_request_body: "Disposable PR created by TS-925 automation to verify that a live accessibility failure blocks any downstream deploy/publish stage in the CI workflow."
  expected_accessibility_markers:
    - axe-core
    - accessibility
    - wcag
    - contrast
    - aria
    - semantic
  contrast_evidence_markers:
    - contrast
    - color contrast
    - ratio
    - wcag
    - 4.5:1
  semantic_evidence_markers:
    - aria
    - aria-label
    - semantics
    - semantic
    - label
  accessibility_job_markers:
    - Accessibility checks
    - accessibility
  downstream_job_markers:
    - Deploy
    - deployment
    - publish
    - pages
    - distribution
  blocked_job_conclusions:
    - skipped
    - cancelled
    - neutral
  poll_interval_seconds: 5
  run_timeout_seconds: 900
  pull_request_timeout_seconds: 180
  ui_timeout_seconds: 60
notes:
  - Reuses the live rendered TS-908 accessibility-failure probe path from main, then verifies whether any downstream deploy/publish stage is exposed and blocked after the accessibility job fails.
  - Records real GitHub Actions run-page evidence for human-style verification.
