test_id: TS-500
type: cli
framework: python
platform: local
dependencies:
  - Dart SDK available on PATH or via TRACKSTATE_DART_BIN
  - git CLI available on PATH
notes:
  - Executes the exact TS-500 local attachment upload command from a disposable TrackState repository configured for github-releases attachment storage.
  - Removes ambient GitHub credentials from the runtime environment and verifies the command surfaces an explicit release-auth/configuration failure instead of writing to repository-path storage.
runtime_inputs:
  ticket_command: trackstate attachment upload --issue TS-475 --file test.txt --target local
  requested_command:
    - trackstate
    - attachment
    - upload
    - --issue
    - TS-475
    - --file
    - test.txt
    - --target
    - local
  project_key: TS
  project_name: TS-500 Project
  issue_key: TS-475
  issue_summary: Release-backed local upload fixture
  source_file_name: test.txt
  source_file_text: |
    TS-500 upload payload
    This file should never be written to repository-path storage.
  attachment_tag_prefix: ts500-
  remote_origin_url: https://github.com/IstiN/trackstate.git
  expected_issue_key: TS-475
  expected_attachment_name: test.txt
  expected_attachment_relative_path: TS/TS-475/attachments/test.txt
  expected_release_fragments:
    - github releases
    - github-releases
    - release-backed
  expected_auth_fragments:
    - github token
    - token
    - auth
    - authentication
    - credential
    - configuration
