test_id: TS-1136
type: cli
framework: unittest
platform: python
dependencies:
  - Dart SDK available on PATH or via TRACKSTATE_DART_BIN
  - git CLI available on PATH
notes:
  - Compiles a temporary `trackstate` executable from this checkout.
  - Seeds a disposable Local Git repository with one existing issue because local mutation commands reject completely empty repositories.
  - Creates two separate issues and links them with `trackstate ticket link --type blocks`.
  - Verifies `links.json` exists only at the repository root and that no issue-specific subdirectory persists its own `links.json` artifact.
