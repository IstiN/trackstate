test_id: TS-707
type: api
framework: gh-cli
platform: github-actions
dependencies:
  - GitHub CLI authenticated with repo and workflow scopes
  - Playwright for GitHub file-page verification
runtime_inputs:
  repository: IstiN/trackstate
  default_branch: main
  workflow_name: Build macOS release artifacts
  workflow_file: build-macos-reusable.yml
  workflow_path: .github/workflows/build-macos-reusable.yml
  caller_workflow_file: build-native.yml
  caller_workflow_path: .github/workflows/build-native.yml
  verify_runner_job_name: Verify macOS runner availability
  build_job_name: Build macOS desktop and CLI artifacts
  setup_flutter_step_name: Set up Flutter
  validation_step_name: Verify runner toolchain
  desktop_build_step_name: Build macOS desktop app
  cli_build_step_name: Build macOS CLI
  required_flutter_version: 3.35.3
  incompatible_flutter_version: 3.30.0
  ui_timeout_seconds: 60
  run_timeout_seconds: 1800
  poll_interval_seconds: 10
  log_excerpt_lines: 40
notes:
  - The macOS build logic has been extracted into `.github/workflows/build-macos-reusable.yml`.
  - The toolchain validation steps (Set up Flutter, Verify runner toolchain, Build macOS desktop app, Build macOS CLI) now live in the reusable workflow.
  - The live probe must trigger the caller workflow (`build-native.yml`) and observe the nested reusable workflow jobs; the file-page check should inspect `.github/workflows/build-macos-reusable.yml` for the toolchain contract.
