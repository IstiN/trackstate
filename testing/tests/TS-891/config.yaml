test_id: TS-891
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app with a stored signed-in GitHub token.
  - Preloads an active local workspace plus one hosted workspace in browser storage.
  - Delays the GitHub auth readiness probe to reproduce high startup authentication latency.
  - Opens Workspace switcher before the delayed auth probe completes, then verifies the row transitions to Local Git after the delayed ready signal.
