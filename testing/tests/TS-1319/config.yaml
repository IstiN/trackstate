test_id: TS-1319
type: api
framework: gh-cli
platform: github-actions
dependencies:
  - GitHub CLI authenticated with repo and workflow scopes for IstiN/trackstate
  - Playwright for Chromium-based human-style verification of the GitHub Actions run pages
runtime_inputs:
  repository: IstiN/trackstate
  default_branch: main
  workflow_name: Build macOS release artifacts
  workflow_file: build-macos-reusable.yml
  workflow_path: .github/workflows/build-macos-reusable.yml
  preflight_job_name: Verify macOS runner availability
  downstream_job_name: Build macOS desktop and CLI artifacts
  expected_preflight_runner: ubuntu-latest
  expected_runner_labels:
    - self-hosted
    - macOS
    - trackstate-release
    - ARM64
  expected_failure_markers:
    - timed out
    - timeout
    - maximum execution time
    - exit code 124
    - Operation timed out
  recent_runs_limit: 20
  poll_interval_seconds: 15
  run_timeout_seconds: 900
  ui_timeout_seconds: 60
notes:
  - The macOS preflight gate now lives in the reusable workflow `.github/workflows/build-macos-reusable.yml`.
  - Live observation should trigger a caller workflow (`release-on-main.yml` or `build-native.yml`) and look for the nested preflight/downstream jobs from the reusable workflow.
