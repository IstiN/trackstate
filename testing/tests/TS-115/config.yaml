test_id: TS-115
type: cli
framework: unittest
platform: python
dependencies:
  - Flutter SDK 3.35.3 available on PATH, at /tmp/flutter/bin/flutter, or bootstrapped automatically
  - TS-119 theme-token policy gate fix deployed on main
notes:
  - Creates a temporary copy of the repository and injects a probe widget under lib/.
  - Reuses the shared HardcodedHexLintValidator to exercise the supported dart run tool/check_theme_tokens.dart enforcement path.
  - Verifies a theme-token color expression passes the policy gate before swapping in a hardcoded hex color.
  - Expects the policy gate to exit non-zero and emit an analyzer-style diagnostic for the hardcoded hex regression.
