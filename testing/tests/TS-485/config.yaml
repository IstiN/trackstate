test_id: TS-485
type: cli
framework: python
platform: local
dependencies:
  - Dart SDK available on PATH or via TRACKSTATE_DART_BIN
  - git CLI available on PATH
  - GH_TOKEN or GITHUB_TOKEN with release upload access to the hosted setup repository
notes:
  - Seeds a disposable local TrackState repository with a legacy repository-path attachment while project settings are set to github-releases and the repository origin points at the live setup repository.
  - Runs the exact CLI upload and download flows needed to verify immutable attachment backend resolution from attachments.json metadata.
  - Uses a unique GitHub Release tag prefix per run and deletes the temporary release after validation.
runtime_inputs:
  ticket_command_upload: trackstate attachment upload --issue TS-10 --file new.png --name new.png --target local
  ticket_command_download: trackstate attachment download --attachment-id TS/TS-10/attachments/old.pdf --out ./downloads/old.pdf --target local
  requested_upload_command:
    - trackstate
    - attachment
    - upload
    - --issue
    - TS-10
    - --file
    - new.png
    - --name
    - new.png
    - --target
    - local
  requested_download_command:
    - trackstate
    - attachment
    - download
    - --attachment-id
    - TS/TS-10/attachments/old.pdf
    - --out
    - ./downloads/old.pdf
    - --target
    - local
  project_key: TS
  project_name: TS-485 Mixed Attachment Backend Project
  issue_key: TS-10
  issue_summary: Attachment metadata manifest mixed-mode fixture
  legacy_attachment_name: old.pdf
  legacy_attachment_text: |
    %PDF-1.4
    TS-485 legacy repository attachment payload
  legacy_attachment_created_at: "2026-05-12T00:00:00Z"
  legacy_attachment_author: legacy-user
  new_attachment_name: new.png
  new_attachment_base64: iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+lm9sAAAAASUVORK5CYII=
  github_release_tag_prefix: trackstate-attachments-
  expected_legacy_backend: repository-path
  expected_new_backend: github-releases
  expected_upload_command_name: attachment-upload
  expected_download_command_name: attachment-download
