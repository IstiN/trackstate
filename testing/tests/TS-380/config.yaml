test_id: TS-380
type: cli
framework: unittest
platform: linux
dependencies:
  - Dart SDK (dart executable on PATH)
  - Python 3.12+
  - PyYAML
runtime_inputs:
  dart_bin: dart
  command: trackstate read fields
  expected_schema:
    - id
    - name
    - custom
    - orderable
    - navigable
    - searchable
    - schema
  expected_schema_subkeys:
    - type
notes:
  - Verifies that the TrackState CLI read fields command returns a flat array of field objects with the Jira-standard schema.
  - Uses the shared probe/validator architecture (TrackStateCliReadFieldsLocalValidator + PythonTrackStateCliReadFieldsLocalFramework) instead of raw subprocess calls in the ticket test file.
  - The framework seeds a temporary TrackState repository, compiles a local CLI binary, and runs the read fields command from the seeded repository.
  - Validates JSON structure, field object keys, schema sub-object keys, and the absence of TrackState envelope markers.
