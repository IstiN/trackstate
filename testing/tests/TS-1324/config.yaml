test_id: TS-1324
type: ci
framework: unittest
platform: python
dependencies:
  - gh CLI authenticated with push access to IstiN/trackstate-setup
  - network access to GitHub REST APIs and GitHub Actions logs
runtime_inputs:
  repository: IstiN/trackstate-setup
  base_branch: main
  target_workflow_name: Actionlint
  target_workflow_path: .github/workflows/actionlint.yml
  branch_prefix: ts1324-actionlint-timeout-minutes
  commit_message: "TS-1324 probe: comment-only actionlint workflow change"
  mutation_search_text: "name: Actionlint"
  mutation_replacement_text: |
    name: Actionlint
    # TS-1324 probe: keep the workflow file valid while forcing a lint run.
  expected_actionlint_marker: actionlint
  expected_log_markers:
    - .github/workflows/actionlint.yml
    - timeout-minutes
    - required
  poll_interval_seconds: 5
  run_timeout_seconds: 120
notes:
  - Touches the live actionlint workflow itself so the branch push triggers the contributor-visible CI gate.
  - The live workflow currently lacks a job-level timeout-minutes check, so the test expects actionlint to reject the change once the policy is enforced.
