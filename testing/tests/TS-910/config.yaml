test_id: TS-910
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app with a stored hosted token.
  - Uses the default desktop viewport for accessibility tickets: 1440x900.
  - Opens the desktop workspace switcher and starts keyboard focus on the selected first saved workspace row.
  - Presses Tab until the visible Save and switch footer button is reached, then presses Tab once more.
  - Verifies focus stays trapped inside the panel and wraps back to the first internal row instead of escaping or sticking on the footer button.
  - Linked bug TS-900 fixed focus escape to Search issues; this ticket extends coverage to the full focus-loop behavior.
