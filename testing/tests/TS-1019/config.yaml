test_id: TS-1019
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app with a stored signed-in GitHub token and a preloaded active local workspace plus hosted fallback workspace.
  - Delays the initial GitHub /user startup probe by 5 seconds to keep startup synchronization pending long enough to verify the shell stays hidden.
  - Waits through the pending window before asserting, then confirms the live shell becomes interactive after the delayed probe resolves.
