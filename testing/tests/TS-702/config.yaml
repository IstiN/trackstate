test_id: TS-702
type: ui
framework: flutter_test
platform: linux
dependencies:
  - Flutter SDK available on PATH
notes:
  - Seeds a returning-user hosted workspace profile so the production shell opens directly into the active workspace.
  - Verifies the persistent Add workspace action is visible in the top app shell beside the workspace switcher.
  - Verifies clicking Add workspace routes the user to the onboarding screen without visiting Settings.
runtime_inputs:
  active_workspace: owner/current@main
  run_command: flutter test testing/tests/TS-702/test_ts_702.dart --reporter expanded
