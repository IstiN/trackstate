test_id: TS-796
type: ui
framework: flutter_test
platform: linux
dependencies:
  - Flutter SDK available on PATH
notes:
  - Seeds one active local workspace and one inactive hosted workspace to keep the local GitHub access affordance visible in the production Settings UI.
  - Verifies the active local workspace row keeps its repository path and branch metadata visible.
  - Verifies the active local local-git configuration still exposes a visible and working Connect GitHub entry point.
runtime_inputs:
  active_workspace_kind: local
  inactive_workspace_kind: hosted
  expected_active_state: Local Git
  expected_sign_in_control: Connect GitHub
  run_command: flutter test testing/tests/TS-796/test_ts_796.dart --reporter expanded
