test_id: TS-873
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app with a stored hosted token and three preloaded saved hosted workspaces.
  - Opens the desktop workspace switcher from Dashboard.
  - Explicitly focuses the active first saved workspace row before sending Arrow Down so the row-list keyboard precondition is established.
  - Uses Arrow Down once to move selection and keyboard focus from the first saved workspace row to the second row.
  - Uses Home to move selection and keyboard focus from the second saved workspace row back to the first row.
  - Uses End to move selection and keyboard focus from the first saved workspace row to the last row.
  - Verifies roving tabindex updates after each boundary-navigation key press so only the selected row remains sequentially focusable.
