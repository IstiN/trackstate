test_id: TS-704
type: ui
framework: flutter_test
platform: linux
dependencies:
  - Flutter SDK available on PATH
notes:
  - Verifies saving a hosted workspace opens the selected workspace dashboard immediately.
  - Verifies the saved workspace becomes active in the production WorkspaceProfileService state.
  - Verifies the in-context hosted repository access prompt is rendered inline for the new workspace when GitHub write access is disconnected.
runtime_inputs:
  initial_workspace: owner/current@main
  selected_workspace: owner/next-repo@release
  access_banner_title: GitHub write access is not connected
  access_banner_action: Connect GitHub
  run_command: flutter test testing/tests/TS-704/test_ts_704.dart --reporter expanded
