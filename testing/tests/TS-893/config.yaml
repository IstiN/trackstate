test_id: TS-893
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app with a stored signed-in GitHub token.
  - Preloads an active local workspace plus one hosted workspace in browser storage.
  - Uses the default desktop viewport of 1440x900 for this ticket.
  - Simulates a transiently busy local workspace by revoking filesystem access to the prepared local repository, keeping it blocked until the header trigger is visible, then restoring access so unblock cannot happen before startup reaches the visible recovery window.
  - Requires restore-specific overlap proof before release from tracked File System Access activity on the saved local workspace lineage, a tracked TS-893 runtime failure probe, or a public pre-release non-restored workspace state while the workspace remains blocked; if no such proof is exposed, the scenario fails as a product/testability gap instead of reporting a false green.
  - Waits after the busy-state release for the workspace switcher trigger to restore the local workspace instead of asserting immediately.
  - Covers the deployed fixes linked from TS-882 and TS-896.
