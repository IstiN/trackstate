  requested_command:
    - trackstate
    - attachment
    - upload
    - --issue
    - TS-100
    - --file
    - 'Report #2026 (Final)!.pdf'
    - --target
    - local
  project_key: TS
  project_name: TS-546 Project
  issue_key: TS-100
  issue_summary: TS-546 release asset sanitization fixture
  source_file_name: 'Report #2026 (Final)!.pdf'
  source_file_text: |-
    TS-546 upload payload
    Verifies special characters normalize before GitHub Release asset upload.
  release_tag_prefix_base: ts546-assets-
  expected_sanitized_asset_name: Report-2026-Final-.pdf
  manifest_poll_timeout_seconds: 120
  manifest_poll_interval_seconds: 4
  release_poll_timeout_seconds: 120
  release_poll_interval_seconds: 4
