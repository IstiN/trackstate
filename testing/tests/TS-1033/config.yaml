test_id: TS-1033
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app against the live implementation.
  - Seeds an active hosted workspace plus a stored GitHub token to simulate a cached authenticated session before launch.
  - Delays the GitHub /user startup probe by 5 seconds and waits long enough to observe that the request begins during bootstrap.
  - Fails if the live app restores the cached session without dispatching the mandatory /user verification request.
