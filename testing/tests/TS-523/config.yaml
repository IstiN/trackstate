test_id: TS-523
type: cli
framework: python
platform: local
dependencies:
  - Dart SDK available on PATH or via TRACKSTATE_DART_BIN
  - git CLI available on PATH
notes:
  - Executes the exact TS-523 local attachment upload command from a disposable TrackState repository configured for github-releases attachment storage and no Git remotes configured.
  - Removes ambient GitHub credentials from the runtime environment for determinism and expects pre-flight repository-identity guidance before release upload setup proceeds.
runtime_inputs:
  ticket_command: trackstate attachment upload --issue TS-475 --file test.txt --target local
  requested_command:
    - trackstate
    - attachment
    - upload
    - --issue
    - TS-475
    - --file
    - test.txt
    - --target
    - local
  project_key: TS
  project_name: TS-523 Project
  issue_key: TS-475
  issue_summary: Release-backed local upload missing-remote fixture
  source_file_name: test.txt
  source_file_text: |
    TS-523 upload payload
    This file should never be written when the local repository has no GitHub remote identity.
  attachment_tag_prefix: ts523-
  expected_attachment_relative_path: TS/TS-475/attachments/test.txt
  expected_identity_fragments:
    - github
    - repository identity
    - local git configuration
  generic_release_auth_fragments:
    - authentication/configuration
    - supports release uploads
    - release-backed attachments
