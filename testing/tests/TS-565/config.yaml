test_id: TS-565
type: cli
framework: python
platform: local
dependencies:
  - Dart SDK available on PATH or via TRACKSTATE_DART_BIN
  - git CLI available on PATH
notes:
  - Automates the TS-565 download validation ordering scenario from a disposable local TrackState repository whose attachment metadata points at github-releases storage and whose Git repository has no remotes configured.
  - The ticket wording uses the older `--issue` plus `--file` download syntax, but the live CLI currently exposes the equivalent release-backed download flow through `--attachment-id` plus `--out`.
  - Verifies the visible failure prioritizes repository identity resolution over authentication state and leaves no downloaded file behind.
runtime_inputs:
  ticket_command: trackstate attachment download --issue TS-123 --file manual.pdf --target local
  supported_ticket_command: trackstate attachment download --attachment-id TS/TS-123/attachments/manual.pdf --out ./downloads/manual.pdf --target local
  requested_command:
    - trackstate
    - attachment
    - download
    - --attachment-id
    - TS/TS-123/attachments/manual.pdf
    - --out
    - ./downloads/manual.pdf
    - --target
    - local
  project_key: TS
  project_name: TS-565 Project
  issue_key: TS-123
  issue_summary: Release-backed local download validation precedence fixture
  attachment_name: manual.pdf
  attachment_relative_path: TS/TS-123/attachments/manual.pdf
  attachment_media_type: application/pdf
  attachment_size_bytes: 19
  attachment_revision_or_oid: missing-remote-565
  attachment_created_at: "2026-05-13T00:00:00Z"
  attachment_author: tester
  attachment_tag_prefix: ts565-
  attachment_release_tag: v2.74.0
  attachment_release_asset_name: manual.pdf
  output_file_argument: ./downloads/manual.pdf
  expected_output_relative_path: downloads/manual.pdf
