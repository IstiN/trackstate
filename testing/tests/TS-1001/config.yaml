test_id: TS-1001
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app with preloaded local and hosted workspaces plus a stored GitHub token.
  - Starts from the local workspace so the delayed GitHub /user startup probe is exercised deterministically before the hosted fallback assertions.
  - Waits beyond the timeout before asserting and then switches into the hosted workspace to inspect the user-visible fallback session state.
  - Verifies the active hosted workspace shows Needs sign-in, Create issue is blocked behind the Open settings recovery gate, and the same browser session persists the hosted workspace access mode as disconnected.
  - Fails as a product gap if the live app still does not expose a public same-session surface for proving canCreateBranch=false.
