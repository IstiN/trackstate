test_id: TS-1001
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app in the hosted workspace with a stored GitHub token and waits beyond the 11-second startup window before asserting.
  - Verifies the live hosted shell still shows Needs sign-in and that Create issue opens the repository-access recovery gate with Open settings.
  - Uses a production Dart provider probe with the real GitHub provider to delay /user for 30 seconds and verify canWrite=false plus canCreateBranch=false at the delayed-auth checkpoint.
