test_id: TS-656
type: api
framework: flutter_test
platform: linux
dependencies:
  - Flutter SDK available on PATH
  - git CLI available on PATH
notes:
  - Reuses the TS-627 Local Git-backed fixture so the test runs against the live storage write provider on a disposable repository.
  - Attempts to persist a mixed `links.json` payload that contains one canonical outward `blocks` record and one non-canonical inward `blocks` record.
  - Verifies the storage-layer response is a validation rejection and that the entire write is atomic, leaving no `links.json`, no visible issue links, and no extra commit behind.
