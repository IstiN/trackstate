test_id: TS-603
type: cli
framework: python
platform: local
dependencies:
  - Dart SDK available on PATH or via TRACKSTATE_DART_BIN
  - git CLI available on PATH
notes:
  - Seeds a disposable local TrackState repository whose project.json contains an unsupported attachmentStorage.mode string.
  - Runs a real local attachment CLI operation against the seeded repository to verify invalid storage modes are rejected during repository initialization.
  - Confirms the user-visible output shows the unsupported mode reason and that the command does not create attachment side effects.
runtime_inputs:
  ticket_command: Initialize the repository provider via the local CLI and attempt to perform an attachment operation.
  supported_ticket_command: trackstate attachment upload --issue TS-10 --file sample.txt --name sample.txt --target local
  requested_command:
    - trackstate
    - attachment
    - upload
    - --issue
    - TS-10
    - --file
    - sample.txt
    - --name
    - sample.txt
    - --target
    - local
  project_key: TS
  project_name: TS-603 Invalid Attachment Storage Mode Project
  issue_key: TS-10
  issue_summary: Unsupported attachment storage mode fixture
  source_file_name: sample.txt
  source_file_text: |
    TS-603 sample attachment payload
  unsupported_attachment_mode: unsupported-mode
  expected_provider: local-git
  expected_target_type: local
  expected_exit_code: 4
  expected_reason_message: "project.json attachmentStorage.mode must be one of: repository-path, github-releases."
  expected_visible_reason_fragments:
    - attachmentStorage.mode
    - repository-path
    - github-releases
  disallowed_error_code: REPOSITORY_OPEN_FAILED
  disallowed_error_category: repository
  disallowed_error_message_fragment: Attachment upload failed for
