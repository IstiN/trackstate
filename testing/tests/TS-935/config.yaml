test_id: TS-935
type: ci
framework: gh-cli
platform: github-actions
dependencies:
  - gh CLI authenticated with push access to IstiN/trackstate and GitHub Actions
  - Playwright for human-style GitHub Actions run-page verification
runtime_inputs:
  repository: IstiN/trackstate
  base_branch: main
  target_workflow_name: Flutter Required Checks
  target_workflow_path: .github/workflows/unit-tests.yml
  probe_path: lib/ts935_probe_surface.dart
  probe_render_host_path: lib/main.dart
  branch_prefix: ts935-accessibility-pass-deploy
  commit_message: "TS-935 probe: verify accessibility pass triggers downstream deploy"
  pull_request_title: "TS-935 disposable probe: verify accessibility pass deploy stage"
  pull_request_body: "Disposable PR created by TS-935 automation to verify that the live pull-request accessibility gate passes and triggers the downstream deploy/publish stage."
  expected_accessibility_markers:
    - accessibility
    - axe-core
    - axe
    - wcag
  contrast_evidence_markers:
    - contrast
    - color contrast
    - ratio
    - wcag
    - 4.5:1
  semantic_evidence_markers:
    - aria
    - semantics
    - semantic
    - label
  accessibility_job_markers:
    - Accessibility checks
    - accessibility
  downstream_job_markers:
    - Deploy
    - deployment
    - publish
    - pages
    - distribution
  poll_interval_seconds: 5
  run_timeout_seconds: 900
  pull_request_timeout_seconds: 180
  ui_timeout_seconds: 60
notes:
  - Reuses the live disposable compliant accessibility probe path from TS-924, then verifies whether the downstream deploy/publish stage executes after the accessibility job succeeds.
  - Captures a real GitHub Actions run-page screenshot for human-style verification.
