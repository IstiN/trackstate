test_id: TS-825
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app with a stored hosted token and two preloaded saved hosted workspaces.
  - Starts Arrow Down from the visible saved-workspace surface so the key path targets actual workspace rows.
  - Verifies Arrow Down does not dismiss the panel and moves the active saved workspace to another visible row; also verifies Shift and Tab do not dismiss the panel, and Tab keeps focus within the panel by moving to another visible control.
