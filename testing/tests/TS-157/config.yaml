test_id: TS-157
type: cli
framework: unittest
platform: python
dependencies:
  - Flutter SDK 3.35.3 available on PATH, at /tmp/flutter/bin/flutter, or via TS157_FLUTTER_BIN / TS132_FLUTTER_BIN / TS115_FLUTTER_BIN / TRACKSTATE_FLUTTER_BIN
notes:
  - Creates a temporary repository copy and injects lib/nest_test/violation.dart with the hardcoded literal Color(0xFF112233).
  - Runs the live enforcement command `dart run tool/check_theme_tokens.dart lib/` before and after the nested file is added.
  - Passes only when the clean directory scan succeeds first, then the nested violation is detected recursively with a non-zero exit and analyzer-style diagnostics that include the nested file path and numeric line/column.
