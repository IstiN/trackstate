test_id: TS-908
type: ci
framework: gh-cli
platform: github-actions
dependencies:
  - gh CLI authenticated with push access to IstiN/trackstate and GitHub Actions
  - network access to GitHub REST APIs and pull request metadata
runtime_inputs:
  repository: IstiN/trackstate
  base_branch: main
  target_workflow_name: Flutter Required Checks
  target_workflow_path: .github/workflows/unit-tests.yml
  probe_path: lib/ts908_probe_surface.dart
  probe_render_host_path: lib/main.dart
  branch_prefix: ts908-accessibility-gate
  commit_message: "TS-908 probe: verify CI accessibility gate on disposable PR"
  pull_request_title: "TS-908 disposable probe: verify CI accessibility gate"
  pull_request_body: "Disposable PR created by TS-908 automation to verify that the live pull-request CI pipeline detects both a low-contrast widget and a non-descriptive semantics label."
  expected_accessibility_markers:
    - axe-core
    - accessibility
    - wcag
    - contrast
    - aria
    - semantic
  contrast_evidence_markers:
    - color-contrast
    - color contrast
    - contrast ratio
    - 4.5:1
    - minimum color contrast ratio thresholds
  semantic_evidence_markers:
    - aria
    - aria-label
    - semantics
    - semantic
    - label
  poll_interval_seconds: 5
  run_timeout_seconds: 900
  pull_request_timeout_seconds: 180
notes:
  - Creates a disposable pull request with a rendered Flutter probe surface that is injected into app startup and uses reduced text contrast plus a weak semantics label.
  - Waits for the live PR workflow run and inspects the actual PR checks surface and workflow logs instead of inferring behavior from workflow source text.
