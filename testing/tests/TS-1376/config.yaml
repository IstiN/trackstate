test_id: TS-1376
type: install-script
framework: unittest
platform: windows
dependencies:
  - PowerShell (pwsh)
  - Python 3.12+
  - PyYAML
notes:
  - Executes scripts/install/install.ps1 against a local mock GitHub release server in an isolated temporary environment.
  - Verifies that a pre-existing trackstate.exe elsewhere on PATH is detected, a clear warning is printed, and the installer exits with a non-zero code without modifying the managed install directory.
  - Regression coverage for bug TS-1375.
runtime_inputs:
  install_script_path: scripts/install/install.ps1
  platform: windows-x64
  binary_name: trackstate.exe
  install_dir_relative: trackstate\bin
