test_id: TS-818
type: web
framework: playwright
platform: chromium
dependencies:
  - Playwright for Python with Chromium installed
  - GH_TOKEN or GITHUB_TOKEN with access to IstiN/trackstate-setup
notes:
  - Opens the deployed TrackState web app with a stored signed-in GitHub token.
  - Preloads an active local workspace plus one hosted workspace in browser storage.
  - Immediately attempts to view or open Workspace switcher after reload, then keeps observing long enough to catch hydration-related state transitions.
  - Fails if the user can see an incorrect hydration state such as Hosted / Needs sign-in or Local Unavailable instead of a guarded loading phase or the final Local Git state.
