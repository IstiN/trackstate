test_id: TS-503
type: cli
framework: python
platform: hosted-github
dependencies:
  - Dart SDK available on PATH or via TRACKSTATE_DART_BIN
  - GH_TOKEN or GITHUB_TOKEN with write access to the hosted setup repository
  - Network access to GitHub APIs
notes:
  - Seeds a temporary hosted `TS-300` issue inside the live `DEMO` project and switches the project attachment storage mode to `github-releases`.
  - Ensures the expected tag `prefix-TS-300` resolves to a mismatched release title (`Manual Release`) before running the exact hosted CLI upload command.
  - Passes only when the CLI fails deterministically, exposes the release mismatch reason, and leaves the hosted release assets and `attachments.json` state unchanged.
runtime_inputs:
  requested_command:
    - trackstate
    - attachment
    - upload
    - --issue
    - TS-300
    - --file
    - release-conflict.txt
    - --target
    - hosted
    - --provider
    - github
    - --repository
    - IstiN/trackstate-setup
    - --branch
    - main
  project_key: DEMO
  project_name: Demo TrackState Project
  issue_key: TS-300
  issue_summary: Release identity conflict fixture
  release_tag_prefix: prefix-
  conflicting_release_title: Manual Release
  expected_release_title: Attachments for TS-300
  local_attachment_name: release-conflict.txt
  local_attachment_content: |
    TS-503 hosted release identity conflict probe payload.
  expected_exit_code: 4
  expected_error_code: REPOSITORY_OPEN_FAILED
  expected_error_category: repository
  required_reason_fragments:
    - GitHub release prefix-TS-300 does not match issue TS-300
    - requires manual cleanup
  required_stdout_fragments:
    - '"ok": false'
    - '"code": "REPOSITORY_OPEN_FAILED"'
    - '"reason": "GitHub release prefix-TS-300 does not match issue TS-300 and requires manual cleanup."'
