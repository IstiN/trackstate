test_id: TS-534
type: cli
framework: python
platform: local-git
dependencies:
  - Dart SDK available on PATH or via TRACKSTATE_DART_BIN
  - git CLI available on PATH
  - gh CLI available on PATH
  - GH_TOKEN or GITHUB_TOKEN with release upload access to the hosted setup repository
notes:
  - Seeds a disposable local TrackState repository configured for github-releases attachment storage and pointed at the live setup repository as origin.
  - Executes the exact local CLI command `trackstate attachment upload --issue TS-100 --file "Report #2026 (Final)!.pdf" --target local`.
  - Verifies the local attachment manifest stores the sanitized GitHub release asset name and that `gh release view` shows the same sanitized asset on the live release container.
runtime_inputs:
  issue_key: TS-100
  source_file_name: Report #2026 (Final)!.pdf
  expected_sanitized_asset_name: Report-2026-Final-.pdf
