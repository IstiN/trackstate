name: Setup repo smoke validation

on:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * *'
  workflow_run:
    workflows: ['Sync Setup Pages']
    types: [completed]

concurrency:
  group: setup-repo-smoke
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  smoke:
    name: Validate setup repo Pages deploy and CLI workflow
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      HAS_APP_CREDS: ${{ (vars.SM_GITHUB_APP_ID != '' || secrets.SM_GITHUB_APP_ID != '') && secrets.SM_GITHUB_APP_PRIVATE_KEY != '' }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        if: env.HAS_APP_CREDS == 'true' && vars.SM_GITHUB_APP_ENABLED == 'true'
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SM_GITHUB_APP_ID || secrets.SM_GITHUB_APP_ID }}
          private-key: ${{ secrets.SM_GITHUB_APP_PRIVATE_KEY }}
          owner: IstiN
          repositories: trackstate-setup

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token || secrets.PAT_TOKEN || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Install Python Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install chromium

      - name: Prewarm the Pages deployment
        run: |
          # GitHub Pages can be cold after a deploy; prime the CDN before measuring.
          curl -fsS --max-time 30 "https://istin.github.io/trackstate-setup/" -o /dev/null || true

      - name: Run setup repo smoke validation
        env:
          # Use the GitHub App token when enabled to avoid PAT rate limits.
          # The App is installed on IstiN/trackstate-setup and must have
          # contents/issues write permissions for the CLI operations below.
          TRACKSTATE_TOKEN: ${{ steps.app-token.outputs.token || secrets.PAT_TOKEN }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.PAT_TOKEN }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.PAT_TOKEN }}
          # The hosted setup repo is heavier than the original 3s/5s budgets assumed;
          # each CLI invocation reloads the snapshot from GitHub. Loosen the
          # thresholds and reduce benchmark concurrency so the job stops flaking.
          SETUP_SMOKE_PAGE_INTERACTIVE_BUDGET_SECONDS: 10
          SETUP_SMOKE_CLI_COMMAND_TIMEOUT_SECONDS: 60
          SETUP_SMOKE_BENCHMARK_CONCURRENCY: 3
          SETUP_SMOKE_BENCHMARK_COMMAND_BUDGET_SECONDS: 25
          SETUP_SMOKE_BENCHMARK_COMMAND_MAX_SECONDS: 35
        run: python testing/scripts/run_setup_repo_smoke.py

      - name: Upload smoke result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: setup-repo-smoke-result
          path: outputs/setup_repo_smoke_result.json
