name: Apple Release Builds

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_ref:
        description: 'Semantic version tag to rebuild (for example v1.2.3)'
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: apple-release-${{ github.event_name == 'push' && github.ref_name || github.event.inputs.release_ref }}
  cancel-in-progress: false

env:
  required_runner_labels: self-hosted,macOS,trackstate-release,ARM64
  release_ref: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.release_ref }}

jobs:
  verify-runner:
    name: Verify macOS runner availability
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          release_ref="${{ env.release_ref }}"
          if [[ ! "$release_ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Apple release workflow requires a semantic version tag such as v1.2.3."
            exit 1
          fi

          echo "tag=$release_ref" >> "$GITHUB_OUTPUT"

      - name: Check configured macOS runner labels
        uses: actions/github-script@v7
        env:
          REQUIRED_LABELS: ${{ env.required_runner_labels }}
        with:
          script: |
            const requiredLabels = process.env.REQUIRED_LABELS.split(',');
            const { owner, repo } = context.repo;
            const response = await github.request(
              'GET /repos/{owner}/{repo}/actions/runners',
              {
                owner,
                repo,
                per_page: 100,
              },
            );

            const matchingRunners = response.data.runners.filter((runner) =>
              requiredLabels.every((label) =>
                runner.labels.some(
                  (runnerLabel) =>
                    runnerLabel.name.toLowerCase() === label.toLowerCase(),
                ),
              ),
            );

            if (matchingRunners.length === 0) {
              core.setFailed(
                `No runner registered for ${owner}/${repo} matches labels [${requiredLabels.join(', ')}]. ` +
                'Provision the TrackState maintainer-owned macOS release runner before rerunning this workflow.',
              );
              return;
            }

            const onlineRunners = matchingRunners.filter(
              (runner) => runner.status === 'online',
            );

            if (onlineRunners.length === 0) {
              core.setFailed(
                `Runner labels [${requiredLabels.join(', ')}] are registered, but none are online. ` +
                'Bring the TrackState release runner online before rerunning this workflow.',
              );
              return;
            }

            core.notice(
              `Using TrackState release runner contract: ${onlineRunners.map((runner) => runner.name).join(', ')}`,
            );

  build-macos-release:
    name: Build macOS desktop and CLI artifacts
    needs: verify-runner
    runs-on: [self-hosted, macOS, trackstate-release, ARM64]
    timeout-minutes: 45
    env:
      release_tag: ${{ needs.verify-runner.outputs.release_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.release_tag }}
          submodules: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify runner toolchain
        shell: bash
        run: ./tool/check_macos_release_runner.sh

      - name: Compute release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          build_name="${release_tag#v}"
          build_number="$(git rev-list --count HEAD)"

          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "desktop_archive=TrackState-macos-arm64-${release_tag}.zip" >> "$GITHUB_OUTPUT"
          echo "cli_archive=trackstate-cli-macos-arm64-${release_tag}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum_file=trackstate-apple-${release_tag}-sha256.txt" >> "$GITHUB_OUTPUT"

      - name: Build macOS desktop app
        shell: bash
        run: |
          set -euo pipefail

          flutter build macos --release \
            --build-name="${{ steps.metadata.outputs.build_name }}" \
            --build-number="${{ steps.metadata.outputs.build_number }}"

      - name: Build macOS CLI
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build/release
          dart compile exe bin/trackstate.dart -o build/release/trackstate

      - name: Package desktop and CLI artifacts
        shell: bash
        run: |
          set -euo pipefail

          app_path="build/macos/Build/Products/Release/trackstate.app"
          if [[ ! -d "$app_path" ]]; then
            app_path=""
            while IFS= read -r candidate_app_path; do
              app_path="$candidate_app_path"
              break
            done < <(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app')
          fi

          if [[ -z "$app_path" || ! -d "$app_path" ]]; then
            echo "::error::macOS app bundle was not produced by flutter build macos."
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent \
            "$app_path" \
            "build/${{ steps.metadata.outputs.desktop_archive }}"

          tar -czf "build/${{ steps.metadata.outputs.cli_archive }}" \
            -C build/release \
            trackstate

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail

          cd build
          shasum -a 256 \
            "${{ steps.metadata.outputs.desktop_archive }}" \
            "${{ steps.metadata.outputs.cli_archive }}" \
            > "${{ steps.metadata.outputs.checksum_file }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trackstate-apple-${{ env.release_tag }}
          path: |
            build/${{ steps.metadata.outputs.desktop_archive }}
            build/${{ steps.metadata.outputs.cli_archive }}
            build/${{ steps.metadata.outputs.checksum_file }}
          if-no-files-found: error

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.release_tag }}
          name: TrackState ${{ env.release_tag }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            build/${{ steps.metadata.outputs.desktop_archive }}
            build/${{ steps.metadata.outputs.cli_archive }}
            build/${{ steps.metadata.outputs.checksum_file }}
