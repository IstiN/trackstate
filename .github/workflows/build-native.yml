name: Apple Release Builds

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: 'Semantic version tag to rebuild, or auto to create the next patch tag'
        required: false
        default: auto
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: apple-release-${{ github.event.inputs.release_ref || 'auto' }}
  cancel-in-progress: false

env:
  release_ref: ${{ github.event.inputs.release_ref || 'auto' }}

jobs:
  resolve-release:
    name: Resolve release tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.release.outputs.tag }}
      release_checkout_ref: ${{ steps.release.outputs.checkout_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          release_ref="$release_ref"
          git fetch --tags --force

          if [[ -z "$release_ref" || "$release_ref" == "auto" ]]; then
            latest_tag="$(
              git tag --list 'v[0-9]*.[0-9]*.[0-9]*' |
                sed -E 's/^v([0-9]+)\.([0-9]+)\.([0-9]+)$/\1 \2 \3 &/' |
                sort -n -k1,1 -k2,2 -k3,3 |
                tail -n 1 |
                awk '{print $4}'
            )"

            if [[ -z "$latest_tag" ]]; then
              release_ref="v0.0.1"
            else
              IFS=. read -r major minor patch <<< "${latest_tag#v}"
              release_ref="v${major}.${minor}.$((patch + 1))"
            fi

            checkout_ref="$GITHUB_SHA"
            echo "Resolved next release tag $release_ref for $checkout_ref"
          else
            checkout_ref="$release_ref"
          fi

          if [[ ! "$release_ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Apple release workflow requires a semantic version tag such as v1.2.3, or auto."
            exit 1
          fi

          echo "tag=$release_ref" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS release artifacts
    needs: resolve-release
    uses: ./.github/workflows/build-macos-reusable.yml
    with:
      release_tag: ${{ needs.resolve-release.outputs.release_tag }}
      release_checkout_ref: ${{ needs.resolve-release.outputs.release_checkout_ref }}
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  publish-release:
    name: Publish macOS release assets
    needs: [resolve-release, build-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      release_tag: ${{ needs.resolve-release.outputs.release_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release.outputs.release_checkout_ref }}
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-macos.outputs.artifact_name }}
          path: build

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail

          cd build
          sha256sum \
            "${{ needs.build-macos.outputs.desktop_archive }}" \
            "${{ needs.build-macos.outputs.cli_archive }}" \
            > "trackstate-apple-${release_tag}.sha256"

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          heartbeat() {
            while true; do
              sleep 60
              echo "::notice::GitHub release asset publishing is still running..."
            done
          }

          heartbeat &
          heartbeat_pid="$!"
          cleanup_heartbeat() {
            kill "$heartbeat_pid" 2>/dev/null || true
            wait "$heartbeat_pid" 2>/dev/null || true
          }
          trap cleanup_heartbeat EXIT

          release_notes="$(mktemp)"
          release_target_commit="$(git rev-parse HEAD)"
          legacy_checksum_asset="trackstate-apple-${release_tag}-sha256.txt"
          if gh release view "$release_tag" >/dev/null 2>&1; then
            echo "Updating existing release $release_tag"
            if gh release view "$release_tag" --json assets --jq '.assets[].name' | grep -Fxq "$legacy_checksum_asset"; then
              gh release delete-asset "$release_tag" "$legacy_checksum_asset" --yes
            fi
          else
            if gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="$release_tag" \
              -f target_commitish="$release_target_commit" \
              --jq '.body' > "$release_notes" 2>/dev/null; then
              echo ""
            else
              echo "::warning::Could not generate release notes from the GitHub API; using fallback scaffold."
              printf '%s\n' \
                '## macOS compiled artifacts' \
                '' \
                '| Platform | Desktop | CLI |' \
                '|---|---|---|' \
                '| macOS | ${{ needs.build-macos.outputs.desktop_archive }} | ${{ needs.build-macos.outputs.cli_archive }} |' \
                '' \
                "Verify downloads with \`trackstate-apple-${release_tag}.sha256\`." \
                '' \
                '> Install commands and detailed asset descriptions will be added in a follow-up story.' \
                > "$release_notes"
            fi

            gh release create "$release_tag" \
              --title "TrackState $release_tag" \
              --notes-file "$release_notes" \
              --target "$release_target_commit"
          fi

          gh release upload "$release_tag" \
            "build/${{ needs.build-macos.outputs.desktop_archive }}" \
            "build/${{ needs.build-macos.outputs.cli_archive }}" \
            "build/trackstate-apple-${release_tag}.sha256" \
            --clobber

          gh release edit "$release_tag" \
            --title "TrackState $release_tag" \
            --target "$release_target_commit" \
            --draft=false \
            --prerelease=false

          cleanup_heartbeat
          trap - EXIT
