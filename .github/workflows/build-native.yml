name: Native Builds

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_macos:
        description: 'Build macOS app'
        type: boolean
        default: true
      build_ios:
        description: 'Build iOS (no-codesign)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-macos:
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_macos == 'true'
    runs-on: [self-hosted, macos]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: 'stable'
          cache: false

      - name: Install dependencies
        run: flutter pub get

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          CERT_PATH=$RUNNER_TEMP/certificate.p12

          # Decode certificate
          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          # Create temporary keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Build macOS app
        run: flutter build macos --release

      - name: Package as DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/trackstate.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          fi
          DMG_PATH="build/TrackState-macOS.dmg"
          hdiutil create -volname "TrackState" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO "$DMG_PATH"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: trackstate-macos-${{ github.sha }}
          path: build/TrackState-macOS.dmg

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/TrackState-macOS.dmg

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

  build-ios:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.build_ios == 'true'
    runs-on: [self-hosted, macos]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: 'stable'
          cache: false

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: cd ios && pod install --repo-update

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: trackstate-ios-${{ github.sha }}
          path: build/ios/iphoneos/Runner.app
