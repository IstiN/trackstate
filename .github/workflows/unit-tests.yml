name: Flutter Required Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  flutter-checks:
    name: Flutter checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Detect Flutter changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            flutter:
              - 'lib/**'
              - 'test/**'
              - 'android/**'
              - 'ios/**'
              - 'web/**'
              - 'linux/**'
              - 'macos/**'
              - 'windows/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'analysis_options.yaml'
              - 'l10n.yaml'
              - 'tool/**'
              - '.dmtools/policies/**'
              - '.github/workflows/unit-tests.yml'

      - name: Skip full Flutter validation
        if: steps.changes.outputs.flutter != 'true'
        run: echo "No Flutter-related changes detected; skipping heavy Flutter validation."

      - name: Setup Flutter
        if: steps.changes.outputs.flutter == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.changes.outputs.flutter == 'true'
        run: flutter pub get

      - name: Analyze
        if: steps.changes.outputs.flutter == 'true'
        run: flutter analyze

      - name: Enforce theme tokens
        if: steps.changes.outputs.flutter == 'true'
        run: dart run tool/check_theme_tokens.dart

      - name: Run unit and golden tests
        if: steps.changes.outputs.flutter == 'true'
        run: flutter test --coverage

      - name: Build web app
        if: steps.changes.outputs.flutter == 'true'
        run: |
          flutter build web --release \
            --base-href /trackstate/ \
            --dart-define TRACKSTATE_REPOSITORY=IstiN/trackstate-setup \
            --dart-define TRACKSTATE_SOURCE_REF=main \
            --dart-define TRACKSTATE_DATA_REF=main \
            --dart-define TRACKSTATE_GITHUB_APP_CLIENT_ID="${{ vars.TRACKSTATE_GITHUB_APP_CLIENT_ID }}" \
            --dart-define TRACKSTATE_GITHUB_AUTH_PROXY_URL="${{ vars.TRACKSTATE_GITHUB_AUTH_PROXY_URL }}"
