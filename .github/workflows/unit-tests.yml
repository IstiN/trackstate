name: Flutter Required Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  flutter-checks:
    name: Flutter checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run unit and golden tests
        run: flutter test --coverage

      - name: Build web app
        run: |
          flutter build web --release \
            --base-href /trackstate/ \
            --dart-define TRACKSTATE_REPOSITORY=IstiN/trackstate-setup \
            --dart-define TRACKSTATE_SOURCE_REF=main \
            --dart-define TRACKSTATE_DATA_REF=main \
            --dart-define TRACKSTATE_GITHUB_APP_CLIENT_ID="${{ vars.TRACKSTATE_GITHUB_APP_CLIENT_ID }}" \
            --dart-define TRACKSTATE_GITHUB_AUTH_PROXY_URL="${{ vars.TRACKSTATE_GITHUB_AUTH_PROXY_URL }}"
