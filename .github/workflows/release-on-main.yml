name: Release on main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-on-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-version:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    name: Resolve semantic version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_checkout_ref: ${{ steps.version.outputs.release_checkout_ref }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Resolve release version
        id: version
        shell: bash
        run: ./tool/resolve_semantic_version.sh >> "$GITHUB_OUTPUT"

  validate:
    name: Validate before release
    needs: resolve-version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-version.outputs.release_checkout_ref }}
          submodules: true
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: stable
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: npm

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Node dependencies
        run: npm ci

      - name: Analyze
        run: flutter analyze

      - name: Enforce theme tokens
        run: dart run tool/check_theme_tokens.dart

      - name: Check web safety
        run: dart run tool/check_web_safety.dart

      - name: Check code duplication
        run: |
          npx jscpd lib/ --min-lines 5 --min-tokens 50 \
            --ignore "**/*.g.dart,**/*.freezed.dart,lib/l10n/generated/**,lib/**/*.gr.dart" \
            --reporters console --threshold 1

      - name: Run unit and golden tests
        run: flutter test

      - name: Build GitHub Pages web app
        env:
          TRACKSTATE_GITHUB_APP_CLIENT_ID: ${{ vars.TRACKSTATE_GITHUB_APP_CLIENT_ID }}
          TRACKSTATE_GITHUB_AUTH_PROXY_URL: ${{ vars.TRACKSTATE_GITHUB_AUTH_PROXY_URL }}
        run: |
          flutter build web --release \
            --base-href /trackstate/ \
            --dart-define TRACKSTATE_REPOSITORY=IstiN/trackstate-setup \
            --dart-define TRACKSTATE_SOURCE_REF=main \
            --dart-define TRACKSTATE_DATA_REF=main \
            --dart-define TRACKSTATE_GITHUB_APP_CLIENT_ID="$TRACKSTATE_GITHUB_APP_CLIENT_ID" \
            --dart-define TRACKSTATE_GITHUB_AUTH_PROXY_URL="$TRACKSTATE_GITHUB_AUTH_PROXY_URL"

  build-linux:
    name: Build Linux release artifacts
    needs: [resolve-version, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      release_tag: ${{ needs.resolve-version.outputs.release_tag }}
      release_checkout_ref: ${{ needs.resolve-version.outputs.release_checkout_ref }}
      BUILD_NUMBER: ${{ needs.resolve-version.outputs.build_number }}
    outputs:
      desktop_archive: ${{ steps.metadata.outputs.desktop_archive }}
      cli_archive: ${{ steps.metadata.outputs.cli_archive }}
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.release_checkout_ref }}
          submodules: true
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Compute release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          build_name="${release_tag#v}"
          build_number="$BUILD_NUMBER"

          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "desktop_archive=TrackState-linux-x64-${release_tag}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "cli_archive=trackstate-cli-linux-x64-${release_tag}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "artifact_name=trackstate-linux-${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Build Linux desktop app
        shell: bash
        env:
          BUILD_NAME: ${{ steps.metadata.outputs.build_name }}
          BUILD_NUMBER: ${{ steps.metadata.outputs.build_number }}
        run: |
          set -euo pipefail
          flutter build linux --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER"

      - name: Build Linux CLI
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release
          dart compile exe bin/trackstate.dart -o build/release/trackstate

      - name: Package Linux desktop and CLI artifacts
        shell: bash
        env:
          DESKTOP_ARCHIVE: ${{ steps.metadata.outputs.desktop_archive }}
          CLI_ARCHIVE: ${{ steps.metadata.outputs.cli_archive }}
        run: |
          set -euo pipefail

          tar -czf "build/$DESKTOP_ARCHIVE" \
            -C build/linux/x64/release/bundle .

          tar -czf "build/$CLI_ARCHIVE" \
            -C build/release \
            trackstate

      - name: Upload Linux workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: |
            build/${{ steps.metadata.outputs.desktop_archive }}
            build/${{ steps.metadata.outputs.cli_archive }}
          if-no-files-found: error

  build-windows:
    name: Build Windows release artifacts
    needs: [resolve-version, validate]
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      release_tag: ${{ needs.resolve-version.outputs.release_tag }}
      release_checkout_ref: ${{ needs.resolve-version.outputs.release_checkout_ref }}
      BUILD_NUMBER: ${{ needs.resolve-version.outputs.build_number }}
    outputs:
      desktop_archive: ${{ steps.metadata.outputs.desktop_archive }}
      cli_archive: ${{ steps.metadata.outputs.cli_archive }}
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.release_checkout_ref }}
          submodules: true
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Compute release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          build_name="${release_tag#v}"
          build_number="$BUILD_NUMBER"

          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "desktop_archive=TrackState-windows-x64-${release_tag}.zip" >> "$GITHUB_OUTPUT"
          echo "cli_archive=trackstate-cli-windows-x64-${release_tag}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "artifact_name=trackstate-windows-${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Build Windows desktop app
        shell: bash
        env:
          BUILD_NAME: ${{ steps.metadata.outputs.build_name }}
          BUILD_NUMBER: ${{ steps.metadata.outputs.build_number }}
        run: |
          set -euo pipefail
          flutter build windows --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER"

      - name: Build Windows CLI
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release
          dart compile exe bin/trackstate.dart -o build/release/trackstate.exe

      - name: Package Windows desktop and CLI artifacts
        shell: bash
        env:
          DESKTOP_ARCHIVE: ${{ steps.metadata.outputs.desktop_archive }}
          CLI_ARCHIVE: ${{ steps.metadata.outputs.cli_archive }}
        run: |
          set -euo pipefail

          cd build/windows/x64/runner/Release
          zip -r "${GITHUB_WORKSPACE}/build/$DESKTOP_ARCHIVE" .

          tar -czf "${GITHUB_WORKSPACE}/build/$CLI_ARCHIVE" \
            -C "${GITHUB_WORKSPACE}/build/release" \
            trackstate.exe

      - name: Upload Windows workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: |
            build/${{ steps.metadata.outputs.desktop_archive }}
            build/${{ steps.metadata.outputs.cli_archive }}
          if-no-files-found: error

  build-macos:
    name: Build macOS release artifacts
    needs: [resolve-version, validate]
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/build-macos-reusable.yml
    with:
      release_tag: ${{ needs.resolve-version.outputs.release_tag }}
      release_checkout_ref: ${{ needs.resolve-version.outputs.release_checkout_ref }}
      build_number: ${{ needs.resolve-version.outputs.build_number }}
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  publish-release:
    name: Publish GitHub release
    needs: [resolve-version, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: write
    env:
      release_tag: ${{ needs.resolve-version.outputs.release_tag }}
      release_checkout_ref: ${{ needs.resolve-version.outputs.release_checkout_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.release_checkout_ref }}
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-linux.outputs.artifact_name }}
          path: build/linux
          if-no-files-found: error

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-windows.outputs.artifact_name }}
          path: build/windows
          if-no-files-found: error

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-macos.outputs.artifact_name }}
          path: build/macos
          if-no-files-found: error

      - name: Generate unified SHA256 checksums
        shell: bash
        env:
          DESKTOP_LINUX: ${{ needs.build-linux.outputs.desktop_archive }}
          CLI_LINUX: ${{ needs.build-linux.outputs.cli_archive }}
          DESKTOP_WINDOWS: ${{ needs.build-windows.outputs.desktop_archive }}
          CLI_WINDOWS: ${{ needs.build-windows.outputs.cli_archive }}
          DESKTOP_MACOS: ${{ needs.build-macos.outputs.desktop_archive }}
          CLI_MACOS: ${{ needs.build-macos.outputs.cli_archive }}
        run: |
          set -euo pipefail

          cd build
          sha256sum \
            "linux/$DESKTOP_LINUX" \
            "linux/$CLI_LINUX" \
            "windows/$DESKTOP_WINDOWS" \
            "windows/$CLI_WINDOWS" \
            "macos/$DESKTOP_MACOS" \
            "macos/$CLI_MACOS" \
            | awk '{ sub(/^[^\/]+\//, "", $2); print $1 "  " $2 }' \
            > "trackstate-${release_tag}.sha256"

      - name: Prepare install script assets
        shell: bash
        env:
          INSTALL_SH: install.sh
          INSTALL_PS1: install.ps1
          INSTALL_CMD: install.cmd
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          install_assets_dir="build/install"
          mkdir -p "$install_assets_dir"
          cp "scripts/install/$INSTALL_SH" "$install_assets_dir/$INSTALL_SH"
          cp "scripts/install/$INSTALL_PS1" "$install_assets_dir/$INSTALL_PS1"
          cp "scripts/install/$INSTALL_CMD" "$install_assets_dir/$INSTALL_CMD"
          chmod +x "$install_assets_dir/$INSTALL_SH"
          sed -i "s|__REPO_PLACEHOLDER__|$GITHUB_REPOSITORY|g" "$install_assets_dir/$INSTALL_SH"
          sed -i "s|__REPO_PLACEHOLDER__|$GITHUB_REPOSITORY|g" "$install_assets_dir/$INSTALL_PS1"
          sed -i "s|__REPO_PLACEHOLDER__|$GITHUB_REPOSITORY|g" "$install_assets_dir/$INSTALL_CMD"

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DESKTOP_LINUX: ${{ needs.build-linux.outputs.desktop_archive }}
          CLI_LINUX: ${{ needs.build-linux.outputs.cli_archive }}
          DESKTOP_MACOS: ${{ needs.build-macos.outputs.desktop_archive }}
          CLI_MACOS: ${{ needs.build-macos.outputs.cli_archive }}
          DESKTOP_WINDOWS: ${{ needs.build-windows.outputs.desktop_archive }}
          CLI_WINDOWS: ${{ needs.build-windows.outputs.cli_archive }}
          INSTALL_SH: install.sh
          INSTALL_PS1: install.ps1
          INSTALL_CMD: install.cmd
        run: |
          set -euo pipefail

          release_target_commit="$(git rev-parse HEAD)"

          release_notes="$(mktemp)"
          trap 'rm -f "$release_notes"' EXIT
          if gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$release_tag" \
            -f target_commitish="$release_target_commit" \
            --jq '.body' > "$release_notes" 2>/dev/null; then
            echo "" >> "$release_notes"
          else
            echo "::warning::Could not generate release notes from the GitHub API; using fallback scaffold."
          fi

          {
            echo "<!-- The compiled artifacts table below is intentionally additive; it is appended even when the GitHub API generates release notes, so every release page lists the published assets. -->"
            echo ""
            echo "## Compiled artifacts"
            echo ""
            echo "| Platform | Desktop | CLI |"
            echo "|---|---|---|"
            echo "| Linux | $DESKTOP_LINUX | $CLI_LINUX |"
            echo "| macOS | $DESKTOP_MACOS | $CLI_MACOS |"
            echo "| Windows | $DESKTOP_WINDOWS | $CLI_WINDOWS |"
            echo ""
            echo "Verify downloads with \`trackstate-${release_tag}.sha256\`."
            echo ""
            echo "## Install the CLI"
            echo ""
            echo "### Linux / macOS"
            echo ""
            echo "\`\`\`bash"
            echo "curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}/install.sh | bash"
            echo "\`\`\`"
            echo ""
            echo "Install a pinned version by passing the tag:"
            echo ""
            echo "\`\`\`bash"
            echo "curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}/install.sh | bash -s -- ${release_tag}"
            echo "\`\`\`"
            echo ""
            echo "### Windows (PowerShell)"
            echo ""
            echo "\`\`\`powershell"
            echo "irm https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}/install.ps1 -OutFile install.ps1"
            echo ".\\install.ps1 -Version ${release_tag}"
            echo "\`\`\`"
            echo ""
            echo "### Windows (Command Prompt)"
            echo ""
            echo "\`\`\`cmd"
            echo "curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}/install.cmd -o install.cmd"
            echo "install.cmd"
            echo "\`\`\`"
            echo ""
            echo "> **Desktop auth:** These desktop builds authenticate with a GitHub fine-grained PAT or a token from \`gh auth token\`. GitHub App OAuth is supported in the web build only."
            echo ""
            echo "> **macOS requirement:** The macOS desktop package is built for Apple Silicon (arm64) and requires an Apple Silicon Mac."
            echo ""
            echo "> **Security warning:** These desktop packages are unsigned and unnotarized. On first launch you may need to confirm the OS security warning: on macOS, right-click the app and choose Open; on Windows, click More info and then Run anyway."
          } >> "$release_notes"

          if gh release view "$release_tag" >/dev/null 2>&1; then
            echo "Updating existing release $release_tag"
          else
            gh release create "$release_tag" \
              --title "TrackState $release_tag" \
              --notes-file "$release_notes" \
              --target "$release_target_commit"
          fi

          gh release upload "$release_tag" \
            "build/linux/$DESKTOP_LINUX" \
            "build/linux/$CLI_LINUX" \
            "build/windows/$DESKTOP_WINDOWS" \
            "build/windows/$CLI_WINDOWS" \
            "build/macos/$DESKTOP_MACOS" \
            "build/macos/$CLI_MACOS" \
            "build/trackstate-${release_tag}.sha256" \
            "build/install/$INSTALL_SH" \
            "build/install/$INSTALL_PS1" \
            "build/install/$INSTALL_CMD" \
            --clobber

          gh release edit "$release_tag" \
            --title "TrackState $release_tag" \
            --target "$release_target_commit" \
            --draft=false \
            --prerelease=false
