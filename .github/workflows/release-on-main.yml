name: Release on main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: release-on-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-version:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    name: Resolve semantic version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_checkout_ref: ${{ steps.version.outputs.release_checkout_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Guard manual dispatch branch
        shell: bash
        env:
          REF: ${{ github.ref }}
        run: |
          if [[ "$REF" != "refs/heads/main" ]]; then
            echo "::error::Release on main workflow must run from the main branch; got $REF."
            exit 1
          fi

      - name: Determine next semantic version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          EXISTING_HEAD_TAG="$(git tag --points-at "$GITHUB_SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)"
          if [[ -n "$EXISTING_HEAD_TAG" ]]; then
            echo "release_tag=$EXISTING_HEAD_TAG" >> "$GITHUB_OUTPUT"
            echo "release_checkout_ref=$EXISTING_HEAD_TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_TAG="$(git tag --list | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)"
          if [[ -z "$LATEST_TAG" ]]; then
            NEXT_VERSION="v0.0.1"
          else
            VERSION_PART="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_PART"
            PATCH=$((PATCH + 1))
            NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "release_tag=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_checkout_ref=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate before release
    needs: resolve-version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-version.outputs.release_checkout_ref }}
          submodules: true
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: stable
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: npm

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Node dependencies
        run: npm ci

      - name: Analyze
        run: flutter analyze

      - name: Enforce theme tokens
        run: dart run tool/check_theme_tokens.dart

      - name: Check web safety
        run: dart run tool/check_web_safety.dart

      - name: Check code duplication
        run: |
          npx jscpd lib/ --min-lines 5 --min-tokens 50 \
            --ignore "**/*.g.dart,**/*.freezed.dart,lib/l10n/generated/**,lib/**/*.gr.dart" \
            --reporters console --threshold 1

      - name: Run unit and golden tests
        run: flutter test

      - name: Build GitHub Pages web app
        env:
          TRACKSTATE_GITHUB_APP_CLIENT_ID: ${{ vars.TRACKSTATE_GITHUB_APP_CLIENT_ID }}
          TRACKSTATE_GITHUB_AUTH_PROXY_URL: ${{ vars.TRACKSTATE_GITHUB_AUTH_PROXY_URL }}
        run: |
          flutter build web --release \
            --base-href /trackstate/ \
            --dart-define TRACKSTATE_REPOSITORY=IstiN/trackstate-setup \
            --dart-define TRACKSTATE_SOURCE_REF=main \
            --dart-define TRACKSTATE_DATA_REF=main \
            --dart-define TRACKSTATE_GITHUB_APP_CLIENT_ID="$TRACKSTATE_GITHUB_APP_CLIENT_ID" \
            --dart-define TRACKSTATE_GITHUB_AUTH_PROXY_URL="$TRACKSTATE_GITHUB_AUTH_PROXY_URL"

  build-linux:
    name: Build Linux release artifacts
    needs: [resolve-version, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      release_tag: ${{ needs.resolve-version.outputs.release_tag }}
      release_checkout_ref: ${{ needs.resolve-version.outputs.release_checkout_ref }}
    outputs:
      desktop_archive: ${{ steps.metadata.outputs.desktop_archive }}
      cli_archive: ${{ steps.metadata.outputs.cli_archive }}
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.release_checkout_ref }}
          submodules: true
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake git ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Compute release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          build_name="${release_tag#v}"
          build_number="$(git rev-list --count HEAD)"

          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "desktop_archive=TrackState-linux-x64-${release_tag}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "cli_archive=trackstate-cli-linux-x64-${release_tag}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "artifact_name=trackstate-linux-${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Build Linux desktop app
        shell: bash
        run: |
          set -euo pipefail
          flutter build linux --release \
            --build-name="${{ steps.metadata.outputs.build_name }}" \
            --build-number="${{ steps.metadata.outputs.build_number }}"

      - name: Build Linux CLI
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release
          dart compile exe bin/trackstate.dart -o build/release/trackstate

      - name: Package Linux desktop and CLI artifacts
        shell: bash
        run: |
          set -euo pipefail

          tar -czf "build/${{ steps.metadata.outputs.desktop_archive }}" \
            -C build/linux/x64/release/bundle .

          tar -czf "build/${{ steps.metadata.outputs.cli_archive }}" \
            -C build/release \
            trackstate

      - name: Upload Linux workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: |
            build/${{ steps.metadata.outputs.desktop_archive }}
            build/${{ steps.metadata.outputs.cli_archive }}
          if-no-files-found: error

  build-windows:
    name: Build Windows release artifacts
    needs: [resolve-version, validate]
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      release_tag: ${{ needs.resolve-version.outputs.release_tag }}
      release_checkout_ref: ${{ needs.resolve-version.outputs.release_checkout_ref }}
    outputs:
      desktop_archive: ${{ steps.metadata.outputs.desktop_archive }}
      cli_archive: ${{ steps.metadata.outputs.cli_archive }}
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.release_checkout_ref }}
          submodules: true
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Compute release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          build_name="${release_tag#v}"
          build_number="$(git rev-list --count HEAD)"

          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "desktop_archive=TrackState-windows-x64-${release_tag}.zip" >> "$GITHUB_OUTPUT"
          echo "cli_archive=trackstate-cli-windows-x64-${release_tag}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "artifact_name=trackstate-windows-${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Build Windows desktop app
        shell: bash
        run: |
          set -euo pipefail
          flutter build windows --release \
            --build-name="${{ steps.metadata.outputs.build_name }}" \
            --build-number="${{ steps.metadata.outputs.build_number }}"

      - name: Build Windows CLI
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release
          dart compile exe bin/trackstate.dart -o build/release/trackstate.exe

      - name: Package Windows desktop and CLI artifacts
        shell: bash
        run: |
          set -euo pipefail

          cd build/windows/x64/runner/Release
          zip -r "${GITHUB_WORKSPACE}/build/${{ steps.metadata.outputs.desktop_archive }}" .

          tar -czf "${GITHUB_WORKSPACE}/build/${{ steps.metadata.outputs.cli_archive }}" \
            -C "${GITHUB_WORKSPACE}/build/release" \
            trackstate.exe

      - name: Upload Windows workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: |
            build/${{ steps.metadata.outputs.desktop_archive }}
            build/${{ steps.metadata.outputs.cli_archive }}
          if-no-files-found: error

  build-macos:
    name: Build macOS release artifacts
    needs: [resolve-version, validate]
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/build-macos-reusable.yml
    with:
      release_tag: ${{ needs.resolve-version.outputs.release_tag }}
      release_checkout_ref: ${{ needs.resolve-version.outputs.release_checkout_ref }}
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  publish-release:
    name: Publish GitHub release
    needs: [resolve-version, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: write
    env:
      release_tag: ${{ needs.resolve-version.outputs.release_tag }}
      release_checkout_ref: ${{ needs.resolve-version.outputs.release_checkout_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.release_checkout_ref }}
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-linux.outputs.artifact_name }}
          path: build/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-windows.outputs.artifact_name }}
          path: build/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-macos.outputs.artifact_name }}
          path: build/macos

      - name: Generate unified SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail

          cd build
          sha256sum \
            "linux/${{ needs.build-linux.outputs.desktop_archive }}" \
            "linux/${{ needs.build-linux.outputs.cli_archive }}" \
            "windows/${{ needs.build-windows.outputs.desktop_archive }}" \
            "windows/${{ needs.build-windows.outputs.cli_archive }}" \
            "macos/${{ needs.build-macos.outputs.desktop_archive }}" \
            "macos/${{ needs.build-macos.outputs.cli_archive }}" \
            | awk '{ sub(/^[^\/]+\//, "", $2); print $1 "  " $2 }' \
            > "trackstate-${release_tag}.sha256"

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DESKTOP_LINUX: ${{ needs.build-linux.outputs.desktop_archive }}
          CLI_LINUX: ${{ needs.build-linux.outputs.cli_archive }}
          DESKTOP_MACOS: ${{ needs.build-macos.outputs.desktop_archive }}
          CLI_MACOS: ${{ needs.build-macos.outputs.cli_archive }}
          DESKTOP_WINDOWS: ${{ needs.build-windows.outputs.desktop_archive }}
          CLI_WINDOWS: ${{ needs.build-windows.outputs.cli_archive }}
        run: |
          set -euo pipefail

          release_target_commit="$(git rev-parse HEAD)"

          release_notes="$(mktemp)"
          if gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$release_tag" \
            -f target_commitish="$release_target_commit" \
            --jq '.body' > "$release_notes" 2>/dev/null; then
            echo "" >> "$release_notes"
          else
            echo "::warning::Could not generate release notes from the GitHub API; using fallback scaffold."
          fi

          {
            echo "## Compiled artifacts"
            echo ""
            echo "| Platform | Desktop | CLI |"
            echo "|---|---|---|"
            echo "| Linux | $DESKTOP_LINUX | $CLI_LINUX |"
            echo "| macOS | $DESKTOP_MACOS | $CLI_MACOS |"
            echo "| Windows | $DESKTOP_WINDOWS | $CLI_WINDOWS |"
            echo ""
            echo "Verify downloads with \`trackstate-${release_tag}.sha256\`."
            echo ""
            echo "> Install commands and detailed asset descriptions will be added in a follow-up story."
          } >> "$release_notes"

          if gh release view "$release_tag" >/dev/null 2>&1; then
            echo "Updating existing release $release_tag"
          else
            gh release create "$release_tag" \
              --title "TrackState $release_tag" \
              --notes-file "$release_notes" \
              --target "$release_target_commit"
          fi

          gh release upload "$release_tag" \
            "build/linux/$DESKTOP_LINUX" \
            "build/linux/$CLI_LINUX" \
            "build/windows/$DESKTOP_WINDOWS" \
            "build/windows/$CLI_WINDOWS" \
            "build/macos/$DESKTOP_MACOS" \
            "build/macos/$CLI_MACOS" \
            "build/trackstate-${release_tag}.sha256" \
            --clobber

          gh release edit "$release_tag" \
            --title "TrackState $release_tag" \
            --target "$release_target_commit" \
            --draft=false \
            --prerelease=false
