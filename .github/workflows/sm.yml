name: SM Agent

run-name: "SM Agent : ${{ github.event_name == 'schedule' && 'scheduled' || github.event_name == 'workflow_run' && format('after {0}', github.event.workflow_run.display_title) || 'manual' }}"

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
  workflow_run:
    workflows: ["AI Teammate"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  check-skip:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success' ||
      github.event.workflow_run.conclusion == 'failure'
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if other AI Teammate runs are in progress
        id: check
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" != "workflow_run" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Count in-progress AI Teammate runs (exclude the one that just completed)
          ACTIVE=$(gh run list --repo ${{ github.repository }} --workflow ai-teammate.yml --status in_progress --json databaseId --jq 'length')
          QUEUED=$(gh run list --repo ${{ github.repository }} --workflow ai-teammate.yml --status queued --json databaseId --jq 'length')
          echo "Active AI Teammate runs: $ACTIVE, Queued: $QUEUED"
          if [ "$ACTIVE" -gt 0 ] || [ "$QUEUED" -gt 0 ]; then
            echo "Skipping SM — other AI Teammate runs still active, SM will trigger when they finish"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "No active AI Teammate runs — SM should process new state"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  sm-agent:
    needs: check-skip
    if: needs.check-skip.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: sm-agent
      cancel-in-progress: false

    steps:
      - name: Job info
        run: |
          echo "SM Agent started"
          echo "Trigger: ${{ github.event_name }}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install DMTools CLI v1.7.195
        run: |
          curl -fsSL https://raw.githubusercontent.com/epam/dm.ai/v1.7.195/install.sh | bash -s v1.7.195

      - name: Add DMTools to PATH
        run: echo "$HOME/.dmtools/bin" >> "$GITHUB_PATH"

      - name: Verify DMTools installation
        run: dmtools -v || echo "dmtools version check failed"

      - name: Configure Git author
        run: |
          git config --global user.name "AI Teammate"
          git config --global user.email "agent.ai.native@gmail.com"

      - name: Run SM Agent
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_PATH: ${{ vars.JIRA_BASE_PATH }}
          JIRA_AUTH_TYPE: ${{ vars.JIRA_AUTH_TYPE }}
          JIRA_TRANSFORM_CUSTOM_FIELDS_TO_NAMES: ${{ vars.JIRA_TRANSFORM_CUSTOM_FIELDS_TO_NAMES }}
          JIRA_EXTRA_FIELDS_PROJECT: ${{ vars.JIRA_EXTRA_FIELDS_PROJECT }}
          JIRA_EXTRA_FIELDS: ${{ vars.JIRA_EXTRA_FIELDS || '[]' }}
          JIRA_CLEAR_CACHE: "true"
          DMTOOLS_CACHE_ENABLED: ${{ vars.DMTOOLS_CACHE_ENABLED }}

          DMTOOLS_INTEGRATIONS: "jira,github,file"

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_DEFAULT_MODEL: ${{ vars.GEMINI_DEFAULT_MODEL }}
          GEMINI_BASE_PATH: ${{ vars.GEMINI_BASE_PATH }}
          DEFAULT_LLM: "gemini"
          DEFAULT_TRACKER: "jira"

          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          SOURCE_GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          SOURCE_GITHUB_WORKSPACE: IstiN
          SOURCE_GITHUB_REPOSITORY: trackstate

          CLI_ALLOWED_COMMANDS: "find,ls,cat,mkdir,bash,run-agent.sh"
          DMTOOLS_FILE_READ_ALLOWED_PATHS: "../.dmtools/**"
        run: |
          CI_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "CI Run URL: ${CI_RUN_URL}"
          dmtools --debug run agents/sm.json --ciRunUrl "${CI_RUN_URL}"
