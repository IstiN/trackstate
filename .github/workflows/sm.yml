name: SM Agent

run-name: "SM Agent : ${{ github.event_name == 'workflow_run' && format('after {0}', github.event.workflow_run.display_title) || 'manual' }}"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["AI Teammate"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  sm-agent:
    # Filter out cancelled AI Teammate runs (only react to success/failure).
    # Scheduled and manual triggers always run.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success' ||
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    concurrency:
      group: sm-agent
      cancel-in-progress: false

    env:
      # Optional GitHub App credentials. When both are set AND the App is marked as
      # installed (SM_GITHUB_APP_ENABLED=true), SM uses the App token instead of
      # PAT_TOKEN, getting a separate (higher) GitHub API rate limit.
      # App ID can be a variable (not sensitive); private key must be a secret.
      HAS_APP_CREDS: ${{ (vars.SM_GITHUB_APP_ID != '' || secrets.SM_GITHUB_APP_ID != '') && secrets.SM_GITHUB_APP_PRIVATE_KEY != '' }}

    steps:
      - name: Job info
        run: |
          echo "SM Agent started"
          echo "Trigger: ${{ github.event_name }}"

      - name: Generate GitHub App token
        id: app-token
        # Only run the App token step when credentials are present AND the repo
        # variable SM_GITHUB_APP_ENABLED is explicitly set to true. This avoids a
        # 404 failure while the App is not yet installed; SM keeps using PAT_TOKEN.
        if: env.HAS_APP_CREDS == 'true' && vars.SM_GITHUB_APP_ENABLED == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SM_GITHUB_APP_ID || secrets.SM_GITHUB_APP_ID }}
          private-key: ${{ secrets.SM_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: trackstate

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token || secrets.PAT_TOKEN || github.token }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install DMTools CLI v1.7.215
        run: |
          curl -fsSL https://raw.githubusercontent.com/epam/dm.ai/v1.7.215/install.sh | bash -s v1.7.215

      - name: Add DMTools to PATH
        run: echo "$HOME/.dmtools/bin" >> "$GITHUB_PATH"

      - name: Verify DMTools installation
        run: dmtools -v || echo "dmtools version check failed"

      - name: Configure Git author
        run: |
          git config --global user.name "AI Teammate"
          git config --global user.email "agent.ai.native@gmail.com"

      - name: Run SM Agent
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_PATH: ${{ vars.JIRA_BASE_PATH }}
          JIRA_AUTH_TYPE: ${{ vars.JIRA_AUTH_TYPE }}
          JIRA_TRANSFORM_CUSTOM_FIELDS_TO_NAMES: ${{ vars.JIRA_TRANSFORM_CUSTOM_FIELDS_TO_NAMES }}
          JIRA_EXTRA_FIELDS_PROJECT: ${{ vars.JIRA_EXTRA_FIELDS_PROJECT }}
          JIRA_EXTRA_FIELDS: ${{ vars.JIRA_EXTRA_FIELDS || '[]' }}
          JIRA_CLEAR_CACHE: "true"
          DMTOOLS_CACHE_ENABLED: ${{ vars.DMTOOLS_CACHE_ENABLED }}

          DMTOOLS_INTEGRATIONS: "jira,github,file"

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_DEFAULT_MODEL: ${{ vars.GEMINI_DEFAULT_MODEL }}
          GEMINI_BASE_PATH: ${{ vars.GEMINI_BASE_PATH }}
          DEFAULT_LLM: "gemini"
          DEFAULT_TRACKER: "jira"

          PAT_TOKEN: ${{ steps.app-token.outputs.token || secrets.PAT_TOKEN }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.PAT_TOKEN }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.PAT_TOKEN }}
          SOURCE_GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.PAT_TOKEN }}
          SOURCE_GITHUB_WORKSPACE: IstiN
          SOURCE_GITHUB_REPOSITORY: trackstate

          CLI_ALLOWED_COMMANDS: "find,ls,cat,mkdir,bash,run-agent.sh"
          DMTOOLS_FILE_READ_ALLOWED_PATHS: ".dmtools/**,../.dmtools/**"
        run: |
          CI_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "CI Run URL: ${CI_RUN_URL}"
          dmtools --debug run agents/sm.json --ciRunUrl "${CI_RUN_URL}"
