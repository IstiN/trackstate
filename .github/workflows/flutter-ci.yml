name: Flutter CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Analyze, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests and goldens
        run: flutter test

      - name: Build GitHub Pages web app
        run: |
          flutter build web --release \
            --base-href /trackstate/ \
            --dart-define TRACKSTATE_REPOSITORY=IstiN/trackstate-setup \
            --dart-define TRACKSTATE_SOURCE_REF=main

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: trackstate-web
          path: build/web
          if-no-files-found: error

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Report Pages setup requirement
        if: steps.deployment.outcome == 'failure'
        run: |
          echo "::warning::GitHub Pages deployment could not be created. Enable Pages for this repository in Settings > Pages; the github-pages artifact was uploaded successfully."
