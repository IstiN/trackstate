name: Sync Setup Pages

on:
  workflow_run:
    workflows: ['Flutter CI']
    types: [completed]

permissions:
  contents: read

jobs:
  dispatch-setup-rebuild:
    name: Rebuild canonical setup Pages app
    if: >
      github.repository == 'IstiN/trackstate' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        if: vars.SM_GITHUB_APP_ENABLED == 'true'
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SM_GITHUB_APP_ID || secrets.SM_GITHUB_APP_ID }}
          private-key: ${{ secrets.SM_GITHUB_APP_PRIVATE_KEY }}
          owner: IstiN
          repositories: trackstate-setup

      - name: Require setup dispatch token
        env:
          DISPATCH_TOKEN: ${{ steps.app-token.outputs.token || secrets.PAT_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "::error::A GitHub App token or PAT_TOKEN is required to dispatch the trackstate-setup Pages rebuild workflow."
            exit 1
          fi

      - name: Dispatch setup rebuild
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token || secrets.PAT_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'IstiN',
              repo: 'trackstate-setup',
              workflow_id: 'install-update-trackstate.yml',
              ref: 'main',
              inputs: {
                trackstate_ref: '${{ github.event.workflow_run.head_sha }}',
              },
            });
