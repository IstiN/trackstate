name: Sync Setup Pages

on:
  workflow_run:
    workflows: ['Flutter CI']
    types: [completed]

permissions:
  contents: read

jobs:
  dispatch-setup-rebuild:
    name: Rebuild canonical setup Pages app
    if: >
      github.repository == 'IstiN/trackstate' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Require setup dispatch token
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "$PAT_TOKEN" ]; then
            echo "::error::PAT_TOKEN is required to dispatch the trackstate-setup Pages rebuild workflow."
            exit 1
          fi

      - name: Dispatch setup rebuild
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'IstiN',
              repo: 'trackstate-setup',
              workflow_id: 'install-update-trackstate.yml',
              ref: 'main',
              inputs: {
                trackstate_ref: '${{ github.event.workflow_run.head_sha }}',
              },
            });
